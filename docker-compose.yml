version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: changemind_postgres
    environment:
      POSTGRES_DB: changemind_db
      POSTGRES_USER: changemind
      POSTGRES_PASSWORD: changemind_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U changemind"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
